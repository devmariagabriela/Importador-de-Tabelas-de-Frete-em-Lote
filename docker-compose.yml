services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8086"
      IMPORT_WORKERS: "${IMPORT_WORKERS:-20}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
    ports:
      - "8086:8086"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8086}"
    ports:
      - "5173:5173"
    depends_on:
      - backend
